# Прод-конфиг nginx: сайт доступен и по HTTP, и по HTTPS (без редиректа),
# статичный (без envsubst). Домен obyasny.ru подставлен статически.
# Монтируется прямо в /etc/nginx/conf.d/default.conf, перекрывая базовый
# mount из docker-compose.yml.
upstream web_app {
    server web:8000;
}

# HTTP: обслуживает сайт напрямую (без редиректа на HTTPS) + ACME-challenge.
server {
    listen 80;
    server_name obyasny.ru;

    # Проверка домена Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;

    location /static/ {
        alias /static/;
        expires 7d;
    }

    # WebSocket-эндпоинт чата
    location /ws/ {
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name obyasny.ru;

    ssl_certificate     /etc/letsencrypt/live/obyasny.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obyasny.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS отключён намеренно: сайт должен открываться и по HTTP.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 10M;

    location /static/ {
        alias /static/;
        expires 7d;
    }

    # WebSocket-эндпоинт чата
    location /ws/ {
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
