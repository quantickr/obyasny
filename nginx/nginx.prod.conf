# Прод-конфиг nginx: HTTP→HTTPS редирект + TLS, статичный (без envsubst).
# Домен obyasny.ru подставлен статически. Монтируется прямо в
# /etc/nginx/conf.d/default.conf, перекрывая базовый mount из docker-compose.yml.
#
# Апстрим НЕ статический (без блока upstream): имя web резолвится через Docker
# DNS (127.0.0.11) на каждый запрос по TTL. Это переживает смену IP контейнера
# web при пересборке (up -d --build web) — иначе nginx кеширует старый IP и
# отдаёт 502 (connection refused) до ручного restart nginx.

# HTTP: ACME-challenge для Certbot + редирект на HTTPS
server {
    listen 80;
    server_name obyasny.ru;

    # Проверка домена Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name obyasny.ru;

    ssl_certificate     /etc/letsencrypt/live/obyasny.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obyasny.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 10M;

    # Docker DNS + переменная: web резолвится динамически на каждый запрос.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_web web:8000;

    location /static/ {
        alias /static/;
        expires 7d;
    }

    # Загруженные пользователями файлы (аватары)
    location /uploads/ {
        alias /uploads/;
        expires 7d;
    }

    # WebSocket-эндпоинт чата
    location /ws/ {
        proxy_pass http://$upstream_web$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://$upstream_web$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
