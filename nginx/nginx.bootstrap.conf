# Bootstrap-конфиг nginx: только HTTP, статичный (без envsubst).
# Нужен для ПЕРВИЧНОГО выпуска TLS-сертификата Certbot'ом (ACME webroot),
# пока сертификата ещё нет и полный prod-конфиг с ssl_certificate не может
# стартовать. server_name = _ (любой хост) — домен на этом этапе не важен.
# Монтируется прямо в /etc/nginx/conf.d/default.conf, перекрывая базовый mount.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Объясни!: ожидание выпуска TLS-сертификата\n';
        add_header Content-Type text/plain;
    }
}
