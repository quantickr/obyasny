# Override для ПЕРВИЧНОГО выпуска TLS-сертификата.
# Подключается поверх prod-конфига ТОЛЬКО на время первого certbot certonly:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.bootstrap.yml up -d nginx
# nginx поднимается лишь на HTTP (без ssl_certificate), чтобы прошёл ACME-challenge.
services:
  nginx:
    volumes:
      # Статичный bootstrap-конфиг (HTTP-only, без ssl_certificate).
      # Монтируем прямо в default.conf — перекрывает и базовый mount, и prod.
      - ./nginx/nginx.bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/web/static:/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    ports:
      - "80:80"
