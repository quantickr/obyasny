{% extends "base.html" %}
{% block title %}Вход — Объясни!{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white p-7 rounded-2xl border border-brand-100 shadow-soft">
    <div class="text-center mb-5">
        <div class="text-4xl mb-2">🎓</div>
        <h1 class="text-2xl font-extrabold">С возвращением</h1>
        <p class="text-sm text-slate-500">Войди в «Объясни!»</p>
    </div>
    {% if error %}
    <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg mb-3">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-3">
        <input type="email" name="email" placeholder="Email" required
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <input type="password" name="password" placeholder="Пароль" required
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <button class="w-full brand-gradient text-white py-2.5 rounded-lg font-bold hover:opacity-90 transition-opacity shadow-soft">Войти</button>
    </form>
    <div class="my-5 flex items-center gap-3 text-xs text-slate-400">
        <div class="flex-1 h-px bg-brand-100"></div>или<div class="flex-1 h-px bg-brand-100"></div>
    </div>
    <div class="flex justify-center">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="{{ bot_username }}"
                data-size="large"
                data-auth-url="{{ webapp_base_url }}/auth/telegram"
                data-request-access="write"></script>
    </div>
    <p class="text-sm text-slate-500 mt-5 text-center">
        Нет аккаунта? <a href="/register" class="text-brand-600 font-semibold hover:underline">Регистрация</a>
    </p>
</div>
{% endblock %}
