{% extends "base.html" %}
{% block title %}Регистрация — Объясни!{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white p-7 rounded-2xl border border-brand-100 shadow-soft">
    <div class="text-center mb-5">
        <div class="text-4xl mb-2">🎓</div>
        <h1 class="text-2xl font-extrabold">Присоединяйся</h1>
        <p class="text-sm text-slate-500">Создай аккаунт в «Объясни!»</p>
    </div>
    {% if error %}
    <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg mb-3">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register" class="space-y-3">
        <input type="text" name="display_name" placeholder="Имя" required
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <input type="email" name="email" placeholder="Email" required
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <input type="password" name="password" placeholder="Пароль" required minlength="6" id="reg-password"
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <input type="password" name="password_confirm" placeholder="Повторите пароль" required minlength="6" id="reg-password-confirm"
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <select name="edu_level" required id="reg-edu-level"
                class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
            <option value="" disabled selected>Уровень обучения</option>
            <option value="schoolchild">Школьник</option>
            <option value="bachelor">Бакалавриат</option>
            <option value="specialist">Специалитет</option>
            <option value="master">Магистратура</option>
            <option value="postgrad">Аспирантура</option>
        </select>
        <input type="text" name="university" placeholder="Вуз (например, МГУ)" required id="reg-university"
               list="university-suggest" autocomplete="off"
               class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
        <datalist id="university-suggest"></datalist>
        <select name="course" required id="reg-course"
                class="w-full border border-brand-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent">
            <option value="" disabled selected id="reg-course-placeholder">Курс</option>
            {% for c in range(1, 12) %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>
        <button class="w-full brand-gradient text-white py-2.5 rounded-lg font-bold hover:opacity-90 transition-opacity shadow-soft">Создать аккаунт</button>
    </form>
    <p class="text-sm text-slate-500 mt-5 text-center">
        Уже есть аккаунт? <a href="/login" class="text-brand-600 font-semibold hover:underline">Войти</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const input = document.querySelector('input[name="university"]');
    const datalist = document.getElementById('university-suggest');
    if (!input || !datalist) return;
    let timer = null;
    input.addEventListener('input', function () {
        const q = input.value.trim();
        clearTimeout(timer);
        if (q.length < 1) {
            datalist.innerHTML = '';
            return;
        }
        timer = setTimeout(async function () {
            try {
                const resp = await fetch(
                    '/api/universities/suggest?q=' + encodeURIComponent(q)
                );
                if (!resp.ok) return;
                const names = await resp.json();
                datalist.innerHTML = '';
                for (const name of names) {
                    const opt = document.createElement('option');
                    opt.value = name;
                    datalist.appendChild(opt);
                }
            } catch (e) { /* тихо игнорируем сетевые сбои */ }
        }, 200);
    });
})();

// Подтверждение пароля: подсветка несовпадения до отправки.
(function () {
    const pw = document.getElementById('reg-password');
    const pw2 = document.getElementById('reg-password-confirm');
    if (!pw || !pw2) return;
    function check() {
        pw2.setCustomValidity(
            pw2.value && pw.value !== pw2.value ? 'Пароли не совпадают' : ''
        );
    }
    pw.addEventListener('input', check);
    pw2.addEventListener('input', check);
})();

// Школьник: вместо «Курс» — «Класс», вуз не нужен (подставляем «Школа»).
(function () {
    const level = document.getElementById('reg-edu-level');
    const uni = document.getElementById('reg-university');
    const coursePh = document.getElementById('reg-course-placeholder');
    if (!level || !uni || !coursePh) return;
    function apply() {
        const isSchool = level.value === 'schoolchild';
        coursePh.textContent = isSchool ? 'Класс' : 'Курс';
        if (isSchool) {
            uni.value = '';
            uni.required = false;
            uni.classList.add('hidden');
        } else {
            uni.required = true;
            uni.classList.remove('hidden');
        }
    }
    level.addEventListener('change', apply);
    apply();
})();
</script>
{% endblock %}
